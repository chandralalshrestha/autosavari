<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AutoSavari</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b1220;
color:white;
}

header{
padding:20px;
background:#111827;
text-align:center;
}

section{
padding:20px;
text-align:center;
}

.box{

background:#111827;

max-width:500px;

margin:auto;

padding:20px;

border-radius:15px;

}

input{

width:90%;

padding:12px;

margin:10px;

border:none;

border-radius:10px;

}

button{

padding:12px 20px;

background:#facc15;

border:none;

border-radius:10px;

font-weight:bold;

cursor:pointer;

margin:5px;

}

.card{

background:#111827;

padding:15px;

margin:10px;

border-radius:10px;

}

iframe{

border-radius:15px;

}

</style>

</head>

<body>

<header>

<h1>
🚕 AutoSavari
</h1>

<p>
Cheap • Fast • Local
</p>

</header>


<section>

<div class="box">

<h2>
Login
</h2>

<input
id="email"
placeholder="autosavari@autosaywa.com">

<input
id="pass"
type="password"
placeholder="Password">

<br>

<button onclick="signup()">
Sign Up
</button>

<button onclick="login()">
Login
</button>

</div>

</section>



<section>

<div class="box">

<h2>
Book Ride
</h2>

<input
id="pickup"
placeholder="Pickup">

<input
id="drop"
placeholder="Drop">

<br>

<button onclick="bookRide()">

Book Auto

</button>

</div>

</section>


<section>

<h2>
📍 Sindhuli Marta Map
</h2>

<iframe

width="90%"

height="350"

loading="lazy"

allowfullscreen

src="https://www.google.com/maps/embed/v1/place?key=AIzaSyAgX_B7ED7V_F2mn9nuJtqxKgCUFjhm1iM&q=Marta,Sindhuli,Nepal">

</iframe>

</section>


<section>

<h2>
Bookings
</h2>

<div id="list">

</div>

</section>



<script type="module">

import {
initializeApp
}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";


import {

getAuth,

createUserWithEmailAndPassword,

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";


import {

getFirestore,

collection,

addDoc,

getDocs

}

from

"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";



const firebaseConfig={

apiKey:
"AIzaSyDzFZhn3wnVDyWFlHfBCUE0PoTGq2jug3k",

authDomain:
"asia-south1-34519.firebaseapp.com",

projectId:
"asia-south1-34519",

storageBucket:
"asia-south1-34519.firebasestorage.app",

messagingSenderId:
"180733727705",

appId:
"1:180733727705:web:778e799b93b42298b33fc8"

};


const app=
initializeApp(
firebaseConfig
);

const auth=
getAuth(app);

const db=
getFirestore(app);



window.signup=
async function(){

let email=
emailInput();

let pass=
passInput();

try{

await createUserWithEmailAndPassword(
auth,
email,
pass
);

alert(
"Signup Success"
);

}

catch(e){

alert(
e.message
);

}

};



window.login=
async function(){

let email=
emailInput();

let pass=
passInput();

try{

await signInWithEmailAndPassword(
auth,
email,
pass
);

alert(
"Login Success"
);

}

catch(e){

alert(
e.message
);

}

};



window.bookRide=
async function(){

let pickup=
document
.getElementById(
"pickup"
)
.value;

let drop=
document
.getElementById(
"drop"
)
.value;

if(
pickup==""||
drop==""
){

alert(
"Fill all"
);

return;

}


await addDoc(

collection(
db,
"rides"
),

{

pickup,

drop,

time:
Date.now()

}

);

alert(
"Ride Booked 🚕"
);

load();

};



async function load(){

let snap=

await getDocs(

collection(
db,
"rides"
)

);

let html="";

snap.forEach(

doc=>{

let d=
doc.data();

html+=`

<div class="card">

🚕
${d.pickup}

→

${d.drop}

</div>

`;

}

);

document
.getElementById(
"list"
)
.innerHTML=

html;

}



function emailInput(){

return document
.getElementById(
"email"
)
.value;

}

function passInput(){

return document
.getElementById(
"pass"
)
.value;

}

load();

</script>

</body>

</html>
